<script>
    window.addEventListener("message", async (event) => {
        if (event.origin !== "https://www.facebook.com") return;

        const datos = event.data; // Aquí recibimos { accion: '...', ... }

        // Elegimos la URL según la acción
        let endpoint = datos.accion === 'crear_usuario' 
            ? 'CONTROLADOR/crear_usuario.php' 
            : 'CONTROLADOR/guardar_interrupcion.php';

        try {
            const respuesta = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            const resultado = await respuesta.json();
            console.log("Respuesta desde el servidor:", resultado);
        } catch (error) {
            console.error("Error en el puente:", error);
        }
    });
</script>
